{% extends 'base.html' %}
{% block title %}Criar Evento{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333;">
    <h1 style="color: #bc13fe; text-align: center;">CRIE O SEU ROLÊ</h1>
    <p style="color: #aaa; text-align: center; margin-bottom: 30px;">Aceite nosso contrato de monetização e crie sua própria lista no The Move.</p>
    
    <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="text" name="nome" placeholder="Nome do Evento" required style="padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;">
        <input type="text" name="local" placeholder="Local" required style="padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;">
        <input type="text" name="data" placeholder="Data (ex: 20 de Novembro)" required style="padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;">
        
        <select name="tipo" style="padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;">
            <option value="show">Festa / Show (Público para amigos)</option>
            <option value="bar">Bar (Lista Secreta)</option>
        </select>
        
        <input type="text" name="tags" placeholder="Tags separadas por vírgula (ex: Rap,Funk,Festa)" required style="padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;">
        
        <div style="margin-top: 15px; background: #2a0000; border: 1px solid #ff4444; padding: 15px; border-radius: 5px;">
            <label style="display: flex; align-items: start; gap: 10px; cursor: pointer;">
                <input type="checkbox" required style="margin-top: 5px;">
                <span style="color: #ddd; font-size: 0.9rem; line-height: 1.4;">
                    <strong>Contrato de Monetização:</strong> Eu aceito os termos do The Move. A plataforma reterá 10% do valor dos ingressos vendidos via app em troca da curadoria de público.
                </span>
            </label>
        </div>

        <button type="submit" style="background: #bc13fe; color: black; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-top: 10px;">Lançar Evento 🔥</button>
    </form>
</div>
{% endblock %}
