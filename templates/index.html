{% extends 'base.html' %}
{% block title %}The Move | Home{% endblock %}

{% block extra_css %}
<style>
    .hero-minimalista {
        position: relative;
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: linear-gradient(rgba(18, 0, 36, 0.7), rgba(89, 0, 143, 0.6)), url('https://images.unsplash.com/photo-1459749411175-04bf5292ceea?q=80&w=2000&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        text-align: center;
    }

    .hero-content h1 {
        font-size: 6rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: 5px;
        text-shadow: 0 0 20px rgba(186, 85, 211, 0.8);
        margin: 0;
        font-family: sans-serif;
    }

    .hero-content h2 {
        font-size: 2.5rem;
        font-weight: 400;
        color: #d8b4e2;
        letter-spacing: 10px;
        margin-top: 10px;
    }
    .btn-main { 
        border: 2px solid #bc13fe; 
        color: #bc13fe; 
        padding: 10px 30px; 
        text-decoration: none; 
        font-weight: bold; 
        transition: 0.3s; 
        background: rgba(0,0,0,0.6); 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        margin-top: 20px;
        display: inline-block;
        font-size: 0.85rem;
    }
    .btn-main:hover { 
        background: #bc13fe; 
        color: black; 
        box-shadow: 0 0 35px #bc13fe; 
        transform: scale(1.05); 
    }
    .section-title {
        color: #bc13fe;
        text-align: center;
        margin-top: 30px;
        font-size: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 900px;
        margin: 0 auto;
    }
    .card {
        background: #111;
        border: 1px solid #333;
        border-radius: 15px;
        padding: 15px;
        text-align: center;
        transition: 0.3s;
    }
    .card:hover {
        border-color: #bc13fe;
        box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
    }
    .card h3 { color: #fff; margin-bottom: 5px; }
    .card p { color: #aaa; font-size: 0.9rem; }
    .badge {
        background: #bc13fe;
        color: black;
        padding: 5px 10px;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: bold;
        display: inline-block;
        margin-bottom: 10px;
    }
    .crie-role {
        background: linear-gradient(45deg, #111, #2a0044);
        padding: 25px;
        text-align: center;
        margin: 30px auto;
        max-width: 600px;
        border-radius: 20px;
        border: 1px solid #bc13fe;
    }
</style>
{% endblock %}

{% block content %}
<section class="hero-minimalista">
  <div class="hero-content">
    <h1>THE MOVE</h1>
    <h2>2026</h2>
  </div>
</section>

{% endblock %}
