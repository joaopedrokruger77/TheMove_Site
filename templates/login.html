{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 100px auto; background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center;">
    <h2 style="color: #bc13fe; margin-bottom: 30px;">ENTRAR</h2>
    <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="email" name="email" placeholder="E-mail" required style="padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;">
        <input type="password" name="senha" placeholder="Senha" required style="padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;">
        <button type="submit" style="background: #bc13fe; color: black; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase;">Login</button>
    </form>
    <p style="color: #aaa; margin-top: 20px;">Não tem conta? <a href="/cadastrar" style="color: #bc13fe;">Cadastre-se</a></p>
</div>
{% endblock %}
