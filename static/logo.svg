<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="transparent"/>
  
  <g transform="translate(10, 15)" filter="url(#neonGlow)" stroke="#b533ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- T -->
    <path d="M 10 20 L 50 20" />
    <path d="M 30 20 L 30 70" />
    <!-- M -->
    <path d="M 30 70 L 30 40 L 45 60 L 60 40 L 60 70" />
  </g>
  <g transform="translate(10, 15)" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- T core -->
    <path d="M 10 20 L 50 20" />
    <path d="M 30 20 L 30 70" />
    <!-- M core -->
    <path d="M 30 70 L 30 40 L 45 60 L 60 40 L 60 70" />
  </g>
</svg>
